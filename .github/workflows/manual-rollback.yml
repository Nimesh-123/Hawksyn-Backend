name: Manual DB Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rollback Database via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.60.218.170
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Update this path to where your backend is hosted on the server
            cd /path/to/your/backend/folder
            echo "Manually rolling back the last database migration..."
            npm run migrate:down
